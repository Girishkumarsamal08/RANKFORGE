<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateBuddy – AI-Powered GATE Prep</title>
  <meta name="description"
    content="GateBuddy: Your AI-Powered GATE Preparation Companion with mock tests, AI study plans, college predictor, and resource hub." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase 10 CDN (compat builds for script-tag usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Lucide Icons CDN (vanilla JS – we'll use SVG helper) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease-out;
    }

    .animate-zoom-in {
      animation: zoomIn 0.5s ease-out;
    }

    .animate-slide-up {
      animation: slideUp 0.4s ease-out;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createElement, cloneElement } = React;

    // --- Lucide Icon Components ---
    // Create React wrapper components for lucide icons
    function LucideIcon({ name, className = '', ...props }) {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          const iconData = lucide.icons[name];
          if (iconData) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            svg.setAttribute('width', '24');
            svg.setAttribute('height', '24');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', 'currentColor');
            svg.setAttribute('stroke-width', '2');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            iconData[2].forEach(pathStr => {
              // pathStr is like ['path', {d: '...'}] or ['circle', {cx:..}]
              const el = document.createElementNS('http://www.w3.org/2000/svg', pathStr[0]);
              const attrs = pathStr[1] || {};
              Object.keys(attrs).forEach(k => el.setAttribute(k, attrs[k]));
              svg.appendChild(el);
            });
            ref.current.appendChild(svg);
          }
        }
      }, [name]);
      return <span ref={ref} className={`inline-flex ${className}`} {...props} />;
    }

    // Shortcut icon components
    const BookOpen = (p) => <LucideIcon name="book-open" {...p} />;
    const Calculator = (p) => <LucideIcon name="calculator" {...p} />;
    const Calendar = (p) => <LucideIcon name="calendar" {...p} />;
    const CheckCircle2 = (p) => <LucideIcon name="check-circle-2" {...p} />;
    const ChevronRight = (p) => <LucideIcon name="chevron-right" {...p} />;
    const Circle = (p) => <LucideIcon name="circle" {...p} />;
    const Clock = (p) => <LucideIcon name="clock" {...p} />;
    const FileText = (p) => <LucideIcon name="file-text" {...p} />;
    const GraduationCap = (p) => <LucideIcon name="graduation-cap" {...p} />;
    const LayoutDashboard = (p) => <LucideIcon name="layout-dashboard" {...p} />;
    const LineChart = (p) => <LucideIcon name="line-chart" {...p} />;
    const Loader2 = (p) => <LucideIcon name="loader-2" {...p} />;
    const PlayCircle = (p) => <LucideIcon name="play-circle" {...p} />;
    const Target = (p) => <LucideIcon name="target" {...p} />;
    const Trophy = (p) => <LucideIcon name="trophy" {...p} />;
    const XCircle = (p) => <LucideIcon name="x-circle" {...p} />;
    const ExternalLink = (p) => <LucideIcon name="external-link" {...p} />;
    const BrainCircuit = (p) => <LucideIcon name="brain-circuit" {...p} />;
    const AlertCircle = (p) => <LucideIcon name="alert-circle" {...p} />;
    const Building = (p) => <LucideIcon name="building" {...p} />;

    // --- Firebase Initialization ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    let app, auth, db;
    try {
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (e) {
      console.warn("Firebase init failed (may not have config):", e.message);
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'gatebuddy-default-id';

    // --- Gemini API Configuration ---
    const GEMINI_API_KEY = ""; // Provided by environment

    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      useEffect(() => {
        if (!auth) {
          // Fallback local user when Firebase config is not available
          setUser({ uid: 'local-dev-user' });
          setAuthLoading(false);
          return;
        }
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Auth initialization failed:", error);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          setAuthLoading(false);
        });

        return () => unsubscribe();
      }, []);

      if (authLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50">
            <Loader2 className="w-8 h-8 animate-spin text-blue-600" />
            <span className="ml-3 text-slate-600 font-medium">Initializing GateBuddy Engine...</span>
          </div>
        );
      }

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50">
            <div className="text-center">
              <GraduationCap className="w-16 h-16 text-blue-600 mx-auto mb-4" />
              <h1 className="text-3xl font-bold text-slate-800">GateBuddy</h1>
              <p className="text-slate-500 mt-2 mb-6">Your AI-Powered GATE Prep Companion</p>
              <button
                onClick={() => {
                  if (auth) {
                    auth.signInAnonymously();
                  } else {
                    // fallback when Firebase is not configured
                    setUser({ uid: 'local-dev-user' });
                  }
                }}
                className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition"
              >
                Start Your Journey
              </button>
            </div>
          </div>
        );
      }

      return <GateBuddyDashboard user={user} />;
    }

    // --- Main Dashboard Component ---
    function GateBuddyDashboard({ user }) {
      const [view, setView] = useState('dashboard');
      const [profile, setProfile] = useState(null);
      const [loadingProfile, setLoadingProfile] = useState(true);
      const [testHistory, setTestHistory] = useState([]);

      useEffect(() => {
        if (!user) return;

        // If Firestore is not available, skip loading from DB and allow app to continue
        if (!db) {
          setLoadingProfile(false);
          return;
        }

        // Fetch Profile
        const fetchProfile = async () => {
          const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('details');
          const docSnap = await docRef.get();
          if (docSnap.exists) {
            setProfile(docSnap.data());
          }
          setLoadingProfile(false);
        };
        fetchProfile();

        // Listen to Test History
        const testsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('tests');
        const unsubscribeTests = testsRef.onSnapshot((snapshot) => {
          const tests = [];
          snapshot.forEach((d) => tests.push({ id: d.id, ...d.data() }));
          tests.sort((a, b) => b.date - a.date);
          setTestHistory(tests);
        });

        return () => unsubscribeTests();
      }, [user]);

      const saveProfile = async (profileData) => {
        if (!db) return;
        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('details').set(profileData);
        setProfile(profileData);
      };

      if (loadingProfile) {
        return (
          <div className="h-screen flex items-center justify-center">
            <Loader2 className="animate-spin text-blue-500 w-8 h-8" />
          </div>
        );
      }

      if (!profile) {
        return <Onboarding saveProfile={saveProfile} />;
      }

      // Calculate Aggregates
      const latestTest = testHistory.length > 0 ? testHistory[0] : null;
      const avgScore = testHistory.length > 0
        ? Math.round(testHistory.reduce((acc, curr) => acc + curr.extrapolatedScore, 0) / testHistory.length)
        : 0;

      return (
        <div className="flex h-screen bg-slate-50 font-sans text-slate-800">
          {/* Sidebar Navigation */}
          <aside className="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex">
            <div className="p-6 border-b border-slate-100 flex items-center space-x-3">
              <div className="bg-blue-600 p-2 rounded-lg text-white">
                <Target className="w-6 h-6" />
              </div>
              <span className="text-xl font-bold text-slate-900">GateBuddy</span>
            </div>

            <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
              <NavItem icon={<LayoutDashboard />} label="Dashboard" isActive={view === 'dashboard'} onClick={() => setView('dashboard')} />
              <NavItem icon={<FileText />} label="Mock Tests" isActive={view === 'tests'} onClick={() => setView('tests')} />
              <NavItem icon={<LineChart />} label="Analysis & AI Plan" isActive={view === 'analysis'} onClick={() => setView('analysis')} />
              <NavItem icon={<Building />} label="College Predictor" isActive={view === 'predictor'} onClick={() => setView('predictor')} />
              <NavItem icon={<BookOpen />} label="Resource Hub" isActive={view === 'resources'} onClick={() => setView('resources')} />
            </nav>

            <div className="p-4 border-t border-slate-100 bg-slate-50">
              <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Target Profile</div>
              <div className="font-semibold text-slate-700">{profile.branch}</div>
              <div className="text-sm text-slate-500">{profile.category} Category</div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 overflow-y-auto">
            {/* Mobile Header */}
            <header className="md:hidden bg-white p-4 border-b flex items-center space-x-3 sticky top-0 z-10">
              <Target className="w-6 h-6 text-blue-600" />
              <span className="font-bold text-lg">GateBuddy</span>
            </header>

            <div className="p-4 md:p-8 max-w-6xl mx-auto">
              {view === 'dashboard' && <DashboardOverview profile={profile} latestTest={latestTest} avgScore={avgScore} setView={setView} />}
              {view === 'tests' && <MockTestEngine user={user} profile={profile} appId={appId} setView={setView} />}
              {view === 'analysis' && <PerformanceAnalysis user={user} profile={profile} testHistory={testHistory} appId={appId} />}
              {view === 'predictor' && <CollegePredictor profile={profile} latestScore={latestTest?.extrapolatedScore || 0} />}
              {view === 'resources' && <ResourceHub profile={profile} />}
            </div>
          </main>
        </div>
      );
    }

    // --- Sub-Components ---

    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-colors ${isActive ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}
        >
          {icon}
          <span>{label}</span>
        </button>
      );
    }

    function Onboarding({ saveProfile }) {
      const [branch, setBranch] = useState('Computer Science (CS)');
      const [category, setCategory] = useState('General');

      const handleSubmit = (e) => {
        e.preventDefault();
        saveProfile({ branch, category, joinedAt: Date.now() });
      };

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 animate-zoom-in">
            <div className="flex justify-center mb-6">
              <div className="bg-blue-100 p-4 rounded-full text-blue-600">
                <Target className="w-10 h-10" />
              </div>
            </div>
            <h2 className="text-2xl font-bold text-center text-slate-800 mb-2">Set Your Target</h2>
            <p className="text-center text-slate-500 mb-8">Personalize your GateBuddy experience.</p>

            <form onSubmit={handleSubmit} className="space-y-6">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">GATE Paper / Branch</label>
                <select value={branch} onChange={(e) => setBranch(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
                  <option>Computer Science (CS)</option>
                  <option>Mechanical Engineering (ME)</option>
                  <option>Electrical Engineering (EE)</option>
                  <option>Civil Engineering (CE)</option>
                  <option>Electronics &amp; Comm. (EC)</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Category (For Rank/Seat Prediction)</label>
                <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
                  <option>General</option>
                  <option>OBC-NCL</option>
                  <option>SC</option>
                  <option>ST</option>
                  <option>EWS</option>
                </select>
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                Initialize Dashboard
              </button>
            </form>
          </div>
        </div>
      );
    }

    function DashboardOverview({ profile, latestTest, avgScore, setView }) {
      const estimateRank = (score) => {
        if (!score || score === 0) return 'N/A';
        if (score >= 85) return '1 - 100 (AIR)';
        if (score >= 70) return '100 - 500 (AIR)';
        if (score >= 55) return '500 - 2000 (AIR)';
        if (score >= 40) return '2000 - 5000 (AIR)';
        return '> 5000 (AIR)';
      };

      return (
        <div className="space-y-8 animate-fade-in">
          <div>
            <h1 className="text-3xl font-bold text-slate-900">Welcome, Aspirant!</h1>
            <p className="text-slate-500">Your GATE {new Date().getFullYear() + 1} preparation dashboard.</p>
          </div>

          {/* KPI Cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
              <div className="bg-indigo-100 p-4 rounded-xl text-indigo-600">
                <Trophy className="w-8 h-8" />
              </div>
              <div>
                <p className="text-sm font-semibold text-slate-500">Latest Extrapolated Score</p>
                <p className="text-2xl font-bold text-slate-900">{latestTest ? `${latestTest.extrapolatedScore} / 100` : 'Take a test!'}</p>
              </div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
              <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600">
                <Target className="w-8 h-8" />
              </div>
              <div>
                <p className="text-sm font-semibold text-slate-500">Estimated Rank</p>
                <p className="text-2xl font-bold text-slate-900">{estimateRank(latestTest?.extrapolatedScore)}</p>
              </div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4 cursor-pointer hover:border-blue-300 transition" onClick={() => setView('tests')}>
              <div className="bg-blue-100 p-4 rounded-xl text-blue-600">
                <PlayCircle className="w-8 h-8" />
              </div>
              <div>
                <p className="text-sm font-semibold text-slate-500">Quick Action</p>
                <p className="text-lg font-bold text-blue-600">Start Mini-Mock ➔</p>
              </div>
            </div>
          </div>

          {/* Feature Highlights */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-8 rounded-2xl shadow-lg text-white">
              <BrainCircuit className="w-10 h-10 text-blue-400 mb-4" />
              <h3 className="text-2xl font-bold mb-2">AI Study Planner</h3>
              <p className="text-slate-300 mb-6">GateBuddy analyzes your mock test mistakes and builds a customized week-by-week study plan to improve weak areas.</p>
              <button onClick={() => setView('analysis')} className="bg-blue-500 text-white px-5 py-2.5 rounded-lg font-medium hover:bg-blue-600 transition">
                View Analysis &amp; Plan
              </button>
            </div>

            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
              <Building className="w-10 h-10 text-emerald-500 mb-4" />
              <h3 className="text-xl font-bold text-slate-800 mb-2">College &amp; PSU Predictor</h3>
              <p className="text-slate-500 mb-6">Based on your latest mock scores and category ({profile.category}), predict your chances at top IITs, NITs, and PSUs.</p>
              <button onClick={() => setView('predictor')} className="bg-slate-100 text-slate-700 px-5 py-2.5 rounded-lg font-medium hover:bg-slate-200 transition">
                Check Predictions
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- Mock Test Engine ---
    function MockTestEngine({ user, profile, appId, setView }) {
      const [testState, setTestState] = useState('idle');
      const [questions, setQuestions] = useState([]);
      const [answers, setAnswers] = useState({});
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [result, setResult] = useState(null);

      const generateDiagnosticTest = async () => {
        setTestState('generating');
        try {
          const prompt = `Generate a 5-question Diagnostic Mock Test for GATE ${profile.branch}.
      Include a mix of easy and medium difficulty.
      Return ONLY a JSON array of objects. No markdown formatting, just raw JSON.
      Format:
      [
        {
          "id": "q1",
          "subject": "Topic Name (e.g. Data Structures, Thermodynamics)",
          "question": "Question text...",
          "options": ["A", "B", "C", "D"],
          "correctAnswerIndex": 0,
          "explanation": "Why this is correct."
        }
      ]`;

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            }
          );

          const data = await response.json();
          let text = data.candidates[0].content.parts[0].text;
          text = text.replace(/```json/g, '').replace(/```/g, '').trim();

          const qData = JSON.parse(text);
          setQuestions(qData);
          setTestState('active');
        } catch (err) {
          console.error(err);
          alert("Failed to generate test. Using fallback questions.");
          setQuestions([
            { id: "1", subject: "General Aptitude", question: "If x = 2 and y = 3, what is x^y?", options: ["5", "6", "8", "9"], correctAnswerIndex: 2, explanation: "2^3 = 8" },
            { id: "2", subject: "Engineering Math", question: "The determinant of an identity matrix is:", options: ["0", "1", "Infinity", "Depends on size"], correctAnswerIndex: 1, explanation: "Det of I is always 1." }
          ]);
          setTestState('active');
        }
      };

      const handleSelectOption = (qIndex, optIndex) => {
        setAnswers(prev => ({ ...prev, [qIndex]: optIndex }));
      };

      const submitTest = async () => {
        let correctCount = 0;
        let wrongCount = 0;
        let unattemptedCount = 0;
        let weakTopics = [];

        questions.forEach((q, idx) => {
          const userAns = answers[idx];
          if (userAns === undefined) {
            unattemptedCount++;
          } else if (userAns === q.correctAnswerIndex) {
            correctCount++;
          } else {
            wrongCount++;
            if (!weakTopics.includes(q.subject)) weakTopics.push(q.subject);
          }
        });

        const rawScore = (correctCount * 2) - (wrongCount * 0.66);
        const maxScore = questions.length * 2;
        const extrapolatedScore = Math.max(0, Math.round((rawScore / maxScore) * 100));

        const testRecord = {
          date: Date.now(),
          branch: profile.branch,
          correct: correctCount,
          wrong: wrongCount,
          unattempted: unattemptedCount,
          extrapolatedScore,
          weakTopics,
          totalQuestions: questions.length
        };

        setResult(testRecord);
        setTestState('review');

        // Save to Firestore
        if (db) {
          try {
            const testRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('tests').doc();
            await testRef.set(testRecord);
          } catch (err) {
            console.error("Failed to save test", err);
          }
        }
      };

      if (testState === 'idle') {
        return (
          <div className="bg-white rounded-2xl p-8 border border-slate-200 text-center max-w-2xl mx-auto mt-10 shadow-sm animate-fade-in">
            <FileText className="w-16 h-16 text-blue-500 mx-auto mb-4" />
            <h2 className="text-2xl font-bold text-slate-800 mb-2">Diagnostic Mini-Test</h2>
            <p className="text-slate-500 mb-8">
              Take a quick AI-generated test for <strong>{profile.branch}</strong>. We'll extrapolate your score out of 100 to predict your rank and analyze weak areas.
            </p>
            <button onClick={generateDiagnosticTest} className="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-blue-700 transition">
              Generate &amp; Start Test
            </button>
          </div>
        );
      }

      if (testState === 'generating') {
        return (
          <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
            <Loader2 className="w-12 h-12 text-blue-500 animate-spin mb-4" />
            <h3 className="text-xl font-bold text-slate-800">Generating Questions...</h3>
            <p className="text-slate-500">Curating specific questions for {profile.branch}</p>
          </div>
        );
      }

      if (testState === 'active') {
        const q = questions[currentQIndex];
        return (
          <div className="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-slide-up">
            <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
              <span className="font-semibold text-slate-600">Question {currentQIndex + 1} of {questions.length}</span>
              <span className="px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full">{q.subject}</span>
            </div>
            <div className="p-6 md:p-8">
              <h3 className="text-lg md:text-xl font-medium text-slate-800 mb-8">{q.question}</h3>
              <div className="space-y-3">
                {q.options.map((opt, idx) => (
                  <button
                    key={idx}
                    onClick={() => handleSelectOption(currentQIndex, idx)}
                    className={`w-full text-left p-4 rounded-xl border-2 transition ${answers[currentQIndex] === idx ? 'border-blue-500 bg-blue-50 text-blue-800 font-medium' : 'border-slate-100 hover:border-slate-300'}`}
                  >
                    {opt}
                  </button>
                ))}
              </div>
            </div>
            <div className="bg-slate-50 px-6 py-4 border-t border-slate-200 flex justify-between items-center">
              <button
                disabled={currentQIndex === 0}
                onClick={() => setCurrentQIndex(prev => prev - 1)}
                className="px-4 py-2 text-slate-600 disabled:opacity-50 font-medium hover:bg-slate-200 rounded-lg transition"
              >
                Previous
              </button>

              {currentQIndex === questions.length - 1 ? (
                <button
                  onClick={submitTest}
                  className="px-6 py-2 bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700 transition"
                >
                  Submit Test
                </button>
              ) : (
                <button
                  onClick={() => setCurrentQIndex(prev => prev + 1)}
                  className="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition"
                >
                  Next
                </button>
              )}
            </div>
          </div>
        );
      }

      if (testState === 'review' && result) {
        return (
          <div className="max-w-3xl mx-auto space-y-6 animate-zoom-in">
            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Test Completed!</h2>
              <div className="text-6xl font-extrabold text-blue-600 my-6">
                {result.extrapolatedScore} <span className="text-2xl text-slate-400">/ 100</span>
              </div>
              <p className="text-slate-500 mb-6">Extrapolated GATE Score based on performance.</p>

              <div className="grid grid-cols-3 gap-4 border-t border-slate-100 pt-6">
                <div>
                  <div className="text-emerald-500 font-bold text-xl">{result.correct}</div>
                  <div className="text-xs text-slate-500 uppercase tracking-wide">Correct</div>
                </div>
                <div>
                  <div className="text-red-500 font-bold text-xl">{result.wrong}</div>
                  <div className="text-xs text-slate-500 uppercase tracking-wide">Incorrect</div>
                </div>
                <div>
                  <div className="text-slate-500 font-bold text-xl">{result.unattempted}</div>
                  <div className="text-xs text-slate-500 uppercase tracking-wide">Skipped</div>
                </div>
              </div>
            </div>

            <div className="flex space-x-4">
              <button onClick={() => setTestState('idle')} className="flex-1 py-3 bg-slate-100 text-slate-700 font-semibold rounded-xl hover:bg-slate-200 transition">
                Take Another
              </button>
              <button onClick={() => setView('analysis')} className="flex-1 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition flex items-center justify-center space-x-2 shadow-lg shadow-blue-200">
                <BrainCircuit className="w-5 h-5" />
                <span>Generate AI Plan</span>
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    // --- Performance Analysis & AI Study Plan ---
    function PerformanceAnalysis({ user, profile, testHistory, appId }) {
      const [aiPlan, setAiPlan] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);
      const [dbPlanId, setDbPlanId] = useState(null);

      useEffect(() => {
        if (!db) return;
        const fetchPlan = async () => {
          try {
            const plansRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('plans');
            const querySnapshot = await plansRef.get();
            if (!querySnapshot.empty) {
              const planDoc = querySnapshot.docs[0];
              setAiPlan(planDoc.data());
              setDbPlanId(planDoc.id);
            }
          } catch (err) {
            console.error("Failed to fetch plan:", err);
          }
        };
        fetchPlan();
      }, [user]);

      const generatePlan = async () => {
        if (testHistory.length === 0) {
          alert("Please take at least one mock test so the AI has data to analyze!");
          return;
        }

        setIsGenerating(true);
        try {
          const weakTopicsSet = new Set();
          testHistory.slice(0, 3).forEach(t => t.weakTopics?.forEach(topic => weakTopicsSet.add(topic)));
          const weakTopicsStr = Array.from(weakTopicsSet).join(', ') || 'General Review';

          const prompt = `Act as an expert GATE ${profile.branch} mentor.
      The student has weak areas in: ${weakTopicsStr}.
      Create a focused, 2-week personalized study plan to improve these areas.
      Return ONLY a JSON object in this format:
      {
        "overview": "Encouraging summary",
        "weeks": [
          {
            "weekNum": 1,
            "focusArea": "String",
            "days": [
              { "day": "Day 1", "task": "Specific task", "resourceHint": "NPTEL/YouTube search term" }
            ]
          }
        ]
      }`;

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
              })
            }
          );

          const data = await response.json();
          const planData = JSON.parse(data.candidates[0].content.parts[0].text);

          const newPlan = { ...planData, generatedAt: Date.now(), basedOn: weakTopicsStr };

          // Save to Firebase
          if (db) {
            const planRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('plans').doc();
            await planRef.set(newPlan);
            setDbPlanId(planRef.id);
          }

          setAiPlan(newPlan);
        } catch (err) {
          console.error(err);
          alert("AI failed to generate plan.");
        } finally {
          setIsGenerating(false);
        }
      };

      if (testHistory.length === 0) {
        return (
          <div className="text-center py-20">
            <AlertCircle className="w-16 h-16 text-slate-300 mx-auto mb-4" />
            <h2 className="text-xl font-bold text-slate-700">No Data Available</h2>
            <p className="text-slate-500 mt-2">Take a mock test first to unlock AI Performance Analysis.</p>
          </div>
        );
      }

      return (
        <div className="space-y-8 animate-fade-in">
          {/* Stat Bar */}
          <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
            <h2 className="text-xl font-bold text-slate-800 mb-4">Historical Performance</h2>
            <div className="flex items-center space-x-2 overflow-x-auto pb-2">
              {testHistory.map((test, idx) => (
                <div key={test.id} className="flex-shrink-0 w-32 bg-slate-50 border border-slate-100 p-4 rounded-xl text-center">
                  <div className="text-xs text-slate-400 mb-1">Test {testHistory.length - idx}</div>
                  <div className={`text-2xl font-bold ${test.extrapolatedScore >= 60 ? 'text-emerald-500' : 'text-orange-500'}`}>
                    {test.extrapolatedScore}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* AI Plan Section */}
          <div className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl p-1 shadow-sm border border-blue-100">
            <div className="bg-white/80 backdrop-blur rounded-xl p-6 md:p-8">
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center space-x-3">
                  <BrainCircuit className="w-8 h-8 text-blue-600" />
                  <h2 className="text-2xl font-bold text-slate-800">Customized Study Plan</h2>
                </div>
                <button
                  onClick={generatePlan}
                  disabled={isGenerating}
                  className="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition disabled:opacity-50 flex items-center"
                >
                  {isGenerating ? <Loader2 className="w-4 h-4 animate-spin mr-2" /> : <Target className="w-4 h-4 mr-2" />}
                  {aiPlan ? 'Regenerate Plan' : 'Generate Plan'}
                </button>
              </div>

              {!aiPlan && !isGenerating && (
                <p className="text-slate-600 italic">Click Generate to let GateBuddy analyze your weak topics and create a personalized routine.</p>
              )}

              {isGenerating && (
                <div className="py-12 text-center text-blue-600">
                  <BrainCircuit className="w-12 h-12 animate-pulse mx-auto mb-4" />
                  <p className="font-medium">Agent analyzing test results...</p>
                </div>
              )}

              {aiPlan && !isGenerating && (
                <div className="space-y-6">
                  <p className="text-slate-700 font-medium bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                    {aiPlan.overview}
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {aiPlan.weeks?.map((week, idx) => (
                      <div key={idx} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                        <div className="bg-slate-50 px-4 py-3 border-b border-slate-200">
                          <h4 className="font-bold text-slate-800">Week {week.weekNum}: <span className="text-blue-600">{week.focusArea}</span></h4>
                        </div>
                        <div className="divide-y divide-slate-100">
                          {week.days?.map((day, dIdx) => (
                            <div key={dIdx} className="p-4 flex items-start space-x-3">
                              <CheckCircle2 className="w-5 h-5 text-slate-300 shrink-0 mt-0.5" />
                              <div>
                                <p className="text-sm font-bold text-slate-700">{day.day}</p>
                                <p className="text-slate-600 mt-1">{day.task}</p>
                                <div className="mt-2 text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded inline-block">
                                  Search: {day.resourceHint}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- Institute Seat Predictor ---
    function CollegePredictor({ profile, latestScore }) {
      const getPrediction = (tier) => {
        let baseCutoff;
        if (tier === 'Top IITs (Bombay, Delhi, Madras)') baseCutoff = 75;
        else if (tier === 'New IITs / Top NITs') baseCutoff = 60;
        else if (tier === 'Other NITs / IIITs') baseCutoff = 45;
        else baseCutoff = 80;

        if (profile.category === 'OBC-NCL') baseCutoff -= 8;
        if (profile.category === 'SC' || profile.category === 'ST') baseCutoff -= 20;
        if (profile.category === 'EWS') baseCutoff -= 5;

        if (latestScore === 0) return { status: 'unknown', text: 'Take a test first' };
        if (latestScore >= baseCutoff + 5) return { status: 'safe', text: 'High Chances' };
        if (latestScore >= baseCutoff - 2) return { status: 'borderline', text: 'Borderline / Waitlist' };
        return { status: 'hard', text: 'Tough Chances' };
      };

      const tiers = [
        { name: 'Top IITs (Bombay, Delhi, Madras)', type: 'iit' },
        { name: 'New IITs / Top NITs', type: 'nit' },
        { name: 'Other NITs / IIITs', type: 'iiit' },
        { name: 'Top PSUs (ONGC, BHEL, IOCL)', type: 'psu' }
      ];

      return (
        <div className="max-w-4xl mx-auto animate-fade-in">
          <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200 mb-8 text-center">
            <Building className="w-16 h-16 text-emerald-500 mx-auto mb-4" />
            <h2 className="text-2xl font-bold text-slate-800">Institute Allocation Predictor</h2>
            <p className="text-slate-500 mt-2 max-w-lg mx-auto">
              Predictions based on your latest extrapolated score (<strong className="text-slate-800">{latestScore}/100</strong>), Branch (<strong className="text-slate-800">{profile.branch}</strong>) and Category (<strong className="text-slate-800">{profile.category}</strong>).
            </p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {tiers.map((tier, idx) => {
              const prediction = getPrediction(tier.name);
              const statusColors = {
                safe: 'bg-emerald-50 border-emerald-200 text-emerald-700',
                borderline: 'bg-amber-50 border-amber-200 text-amber-700',
                hard: 'bg-red-50 border-red-200 text-red-700',
                unknown: 'bg-slate-50 border-slate-200 text-slate-500'
              };
              const badgeColors = {
                safe: 'bg-emerald-500', borderline: 'bg-amber-500', hard: 'bg-red-500', unknown: 'bg-slate-400'
              };

              return (
                <div key={idx} className={`p-6 rounded-2xl border-2 transition ${statusColors[prediction.status]}`}>
                  <div className="flex justify-between items-start mb-4">
                    <h3 className="font-bold text-lg">{tier.name}</h3>
                    <span className={`px-3 py-1 text-white text-xs font-bold rounded-full shadow-sm ${badgeColors[prediction.status]}`}>
                      {prediction.text}
                    </span>
                  </div>
                  <p className="text-sm opacity-80">
                    {prediction.status === 'safe' && "Your current trajectory makes you a strong candidate. Maintain consistency!"}
                    {prediction.status === 'borderline' && "You are in the competitive zone. Small improvements in weak areas will secure a seat."}
                    {prediction.status === 'hard' && "Significant score improvement needed. Focus strictly on the AI Study Plan."}
                    {prediction.status === 'unknown' && "Score data required to predict chances."}
                  </p>
                </div>
              );
            })}
          </div>

          <p className="text-center text-xs text-slate-400 mt-8">
            * Predictions are estimates based on historical trends and heuristic models. Actual cutoffs vary annually.
          </p>
        </div>
      );
    }

    // --- Resource Hub ---
    function ResourceHub({ profile }) {
      const resources = [
        { title: "Official GATE Website", desc: "Information brochure, syllabus, and official notices.", link: "https://gate2024.iisc.ac.in/", type: "Official" },
        { title: "NPTEL Video Lectures", desc: "Free comprehensive engineering courses by IIT professors.", link: "https://nptel.ac.in/", type: "Video" },
        { title: `Previous Year Papers (${profile.branch.split(' ')[0]})`, desc: "Archived official question papers and answer keys.", link: "#", type: "PDF" },
        { title: "Virtual Calculator Tool", desc: "Practice with the exact calculator UI used in the GATE exam.", link: "#", type: "Tool" }
      ];

      return (
        <div className="max-w-4xl mx-auto animate-fade-in">
          <div className="mb-8">
            <h2 className="text-3xl font-bold text-slate-900 mb-2">Resource Hub</h2>
            <p className="text-slate-500">Curated materials and important links for your preparation.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {resources.map((res, idx) => (
              <a key={idx} href={res.link} target="_blank" rel="noopener noreferrer" className="group block bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-400 hover:shadow-md transition">
                <div className="flex justify-between items-start mb-3">
                  <span className="text-xs font-bold px-2 py-1 bg-slate-100 text-slate-600 rounded">
                    {res.type}
                  </span>
                  <ExternalLink className="w-5 h-5 text-slate-400 group-hover:text-blue-500 transition" />
                </div>
                <h3 className="font-bold text-lg text-slate-800 mb-2 group-hover:text-blue-600 transition">{res.title}</h3>
                <p className="text-sm text-slate-500">{res.desc}</p>
              </a>
            ))}
          </div>
        </div>
      );
    }

    // --- Render the App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
